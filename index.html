<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกรายรับ-รายจ่าย (Auto-Sync)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-900">

    <div class="max-w-6xl mx-auto" id="app">
        <!-- Header -->
        <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="wallet" class="text-blue-600"></i> บันทึกรายรับ-รายจ่าย
                </h1>
                <div class="flex items-center gap-2 mt-1">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-green-500"></div>
                    <p id="status-text" class="text-slate-500 text-sm">พร้อมใช้งาน</p>
                </div>
            </div>
            <button onclick="fetchData()" class="flex items-center gap-2 bg-white hover:bg-slate-50 px-4 py-2 rounded-xl shadow-sm border border-slate-200 transition-all active:scale-95">
                <i data-lucide="refresh-cw" id="refresh-icon" class="text-slate-600"></i>
                <span class="text-sm font-medium">รีเฟรชข้อมูล</span>
            </button>
        </header>

        <!-- Dashboard -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-slate-500 font-medium">ยอดคงเหลือ</span>
                    <i data-lucide="circle-dollar-sign" class="text-blue-500"></i>
                </div>
                <div id="balance-amt" class="text-2xl font-bold">฿0</div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-2 text-green-600 font-medium">
                    <span>รายรับรวม</span>
                    <i data-lucide="trending-up"></i>
                </div>
                <div id="income-amt" class="text-2xl font-bold">฿0</div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-2 text-red-600 font-medium">
                    <span>รายจ่ายรวม</span>
                    <i data-lucide="trending-down"></i>
                </div>
                <div id="expense-amt" class="text-2xl font-bold">฿0</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Form -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h2 class="text-xl font-semibold mb-4 text-slate-800">เพิ่มรายการ</h2>
                    <form id="transaction-form" class="space-y-4">
                        <div class="flex p-1 bg-slate-100 rounded-lg" id="type-toggle">
                            <button type="button" data-type="income" class="type-btn flex-1 py-2 rounded-md text-sm font-medium transition-all text-slate-500">รายรับ</button>
                            <button type="button" data-type="expense" class="type-btn flex-1 py-2 rounded-md text-sm font-medium transition-all bg-white text-red-600 shadow-sm">รายจ่าย</button>
                        </div>

                        <div>
                            <label class="block text-sm text-slate-600 mb-1">วันที่</label>
                            <input type="date" id="input-date" required class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>

                        <div>
                            <label class="block text-sm text-slate-600 mb-1">รายการ</label>
                            <input type="text" id="input-desc" placeholder="เช่น ค่าอาหาร" required class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-sm text-slate-600 mb-1">จำนวนเงิน</label>
                                <input type="number" id="input-amount" placeholder="0.00" required class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm text-slate-600 mb-1">หมวดหมู่</label>
                                <select id="input-cat" class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                    <option>อาหาร</option>
                                    <option>เดินทาง</option>
                                    <option>ช้อปปิ้ง</option>
                                    <option>บันเทิง</option>
                                    <option>ที่พัก</option>
                                    <option>เงินเดือน</option>
                                    <option>อื่นๆ</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" id="submit-btn" class="w-full py-3 rounded-xl font-bold text-white bg-red-600 hover:bg-red-700 transition-all shadow-md active:scale-95 flex items-center justify-center gap-2">
                            <i data-lucide="plus-circle" size="20"></i> เพิ่มรายการ
                        </button>
                    </form>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h2 class="text-lg font-semibold mb-4 text-slate-800">สัดส่วนรายจ่าย</h2>
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>

            <!-- List -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold text-slate-800">ประวัติรายการ</h2>
                        <span id="count-tag" class="text-xs text-slate-400 bg-slate-50 px-2 py-1 rounded">0 รายการ</span>
                    </div>
                    <div id="transaction-list" class="space-y-3 max-h-[600px] overflow-y-auto custom-scrollbar pr-2">
                        <!-- Items injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyUo7IF3bZrTdGvQORfsP6PEeJ01EvA2R00qwzgNql_APa3wTYl98HANvu9xaqzxnwJbQ/exec';
        let transactions = [];
        let currentType = 'expense';
        let chartInstance = null;

        // Initialize Icons
        lucide.createIcons();

        // DOM Elements
        const form = document.getElementById('transaction-form');
        const listContainer = document.getElementById('transaction-list');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const refreshIcon = document.getElementById('refresh-icon');

        // Set Default Date
        document.getElementById('input-date').value = new Date().toISOString().split('T')[0];

        // Type Toggle Logic
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentType = btn.dataset.type;
                document.querySelectorAll('.type-btn').forEach(b => {
                    b.classList.remove('bg-white', 'text-green-600', 'text-red-600', 'shadow-sm');
                    b.classList.add('text-slate-500');
                });
                btn.classList.remove('text-slate-500');
                btn.classList.add('bg-white', 'shadow-sm', currentType === 'income' ? 'text-green-600' : 'text-red-600');
                
                const submitBtn = document.getElementById('submit-btn');
                submitBtn.className = `w-full py-3 rounded-xl font-bold text-white transition-all shadow-md active:scale-95 flex items-center justify-center gap-2 ${currentType === 'income' ? 'bg-green-600 hover:bg-green-700' : 'bg-red-600 hover:bg-red-700'}`;
            });
        });

        // Load Initial Data
        window.onload = () => {
            const saved = localStorage.getItem('my_expenses');
            if (saved) {
                transactions = JSON.parse(saved);
                renderApp();
            }
            fetchData();
        };

        async function fetchData() {
            setLoading(true, "กำลังโหลดจาก Google Sheets...");
            try {
                const response = await fetch(SHEET_URL);
                if (!response.ok) throw new Error();
                const data = await response.json();
                if (Array.isArray(data)) {
                    transactions = data.map(i => ({...i, amount: parseFloat(i.amount), id: Number(i.id)}))
                                     .sort((a,b) => b.id - a.id);
                    localStorage.setItem('my_expenses', JSON.stringify(transactions));
                }
                setLoading(false, "ข้อมูลล่าสุดจาก Cloud");
            } catch (e) {
                console.error(e);
                setLoading(false, "แสดงข้อมูลล่าสุด (Offline Mode)", "bg-amber-500");
            }
            renderApp();
        }

        async function syncData() {
            setLoading(true, "กำลังซิงค์ไปที่ Cloud...");
            try {
                await fetch(SHEET_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(transactions)
                });
                setLoading(false, "บันทึกเรียบร้อย");
            } catch (e) {
                setLoading(false, "บันทึกในเครื่องแล้ว (รอซิงค์)", "bg-amber-500");
            }
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const newItem = {
                id: Date.now(),
                description: document.getElementById('input-desc').value,
                amount: parseFloat(document.getElementById('input-amount').value),
                type: currentType,
                category: document.getElementById('input-cat').value,
                date: document.getElementById('input-date').value
            };
            transactions = [newItem, ...transactions];
            form.reset();
            document.getElementById('input-date').value = new Date().toISOString().split('T')[0];
            renderApp();
            await syncData();
        };

        async function deleteItem(id) {
            transactions = transactions.filter(t => t.id !== id);
            renderApp();
            await syncData();
        }

        function renderApp() {
            // Totals
            let inc = 0, exp = 0;
            const cats = {};
            
            listContainer.innerHTML = '';
            transactions.forEach(t => {
                if (t.type === 'income') inc += t.amount;
                else {
                    exp += t.amount;
                    cats[t.category] = (cats[t.category] || 0) + t.amount;
                }

                // List Items
                const div = document.createElement('div');
                div.className = "group flex items-center justify-between p-4 bg-slate-50 hover:bg-blue-50 rounded-xl transition-all border border-transparent hover:border-blue-100";
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="p-2 rounded-lg ${t.type === 'income' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                            <i data-lucide="${t.type === 'income' ? 'trending-up' : 'trending-down'}" size="20"></i>
                        </div>
                        <div>
                            <div class="font-semibold text-slate-800">${t.description}</div>
                            <div class="text-xs text-slate-500 flex items-center gap-2">
                                <span>${t.date}</span>
                                <span class="w-1 h-1 bg-slate-300 rounded-full"></span>
                                <span>${t.category}</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold ${t.type === 'income' ? 'text-green-600' : 'text-red-600'}">
                            ${t.type === 'income' ? '+' : '-'} ฿${t.amount.toLocaleString()}
                        </span>
                        <button onclick="deleteItem(${t.id})" class="p-2 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">
                            <i data-lucide="trash-2" size="18"></i>
                        </button>
                    </div>
                `;
                listContainer.appendChild(div);
            });

            document.getElementById('balance-amt').innerText = `฿${(inc - exp).toLocaleString()}`;
            document.getElementById('income-amt').innerText = `฿${inc.toLocaleString()}`;
            document.getElementById('expense-amt').innerText = `฿${exp.toLocaleString()}`;
            document.getElementById('count-tag').innerText = `${transactions.length} รายการ`;

            updateChart(cats);
            lucide.createIcons();
        }

        function updateChart(cats) {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            const data = {
                labels: Object.keys(cats),
                datasets: [{
                    data: Object.values(cats),
                    backgroundColor: ['#0088FE', '#00C49F', '#FFBB28', '#FF8042', '#8884d8', '#82ca9d']
                }]
            };

            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: data,
                options: { plugins: { legend: { position: 'bottom' } } }
            });
        }

        function setLoading(active, text, dotClass = "bg-green-500") {
            statusText.innerText = text;
            statusDot.className = `w-2 h-2 rounded-full ${active ? 'bg-amber-500 animate-pulse' : dotClass}`;
            if (active) refreshIcon.classList.add('animate-spin');
            else refreshIcon.classList.remove('animate-spin');
        }
    </script>
</body>
</html>
